<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D44235"/>
      <stop offset="100%" stop-color="#8E1B12"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (no rounded corners — Android crops to circle/squircle) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="260" fill="url(#shine)"/>

  <!-- Content within safe zone (inner 80%: 52px margin each side → 408x408 centered) -->
  <!-- Eighth note — scaled slightly smaller + shifted to stay within safe zone -->
  <ellipse cx="218" cy="320" rx="62" ry="44" fill="white" transform="rotate(-22 218 320)"/>
  <rect x="272" y="134" width="18" height="194" rx="9" fill="white"/>
  <path d="M 290,134 C 362,160 369,232 282,254" stroke="white" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Three ermine dots (Breton heraldry) -->
  <circle cx="192" cy="400" r="11" fill="white" opacity="0.75"/>
  <circle cx="232" cy="400" r="11" fill="white" opacity="0.75"/>
  <circle cx="272" cy="400" r="11" fill="white" opacity="0.75"/>
</svg>
